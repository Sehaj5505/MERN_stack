<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            border:2px solid black;
            height:500px;
            width:90%;
            margin:auto;
            display:flex;
            justify-content:center;
            align-items:center;
            gap:20px;
            padding:20px;
            background-color:bisque;

        }
        #container>div{
            border: 2px solid red;
            width:30%;
            height:150px;
            display:flex;
            align-items:center;
            justify-content: center;
            background-color: rgb(236, 214, 256);
            border-radius:5%;
            /*from google boxshadow*/
            box-shadow: rgba(0, 0, 0, 0.25) 0px 54px 55px, rgba(0, 0, 0, 0.12) 0px -12px 30px, rgba(0, 0, 0, 0.12) 0px 4px 6px, rgba(0, 0, 0, 0.17) 0px 12px 13px, rgba(0, 0, 0, 0.09) 0px -3px 5px;
        }
    </style>
</head>
<body>
    <!--div*3-->
    <!--To write in all simultaneously ctrl+alt+down arrow-->
    <div id="container">
        <div style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">This is Div 1</div>
        <div style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">This is Div 2</div>
        <div style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">This is Div 3</div>
    </div>
    
</body>
</html>
